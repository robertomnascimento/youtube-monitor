name: YouTube Monitor Daily

on:
  schedule:
    - cron: '0 11 * * *'  # 8h horário de Brasília (BRT = UTC-3)
  workflow_dispatch:       # Permite rodar manualmente

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create Google Credentials
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        mkdir -p credentials
        printf '%s' "$GOOGLE_CREDENTIALS" > credentials/google_credentials.json
        python -c "import json; json.load(open('credentials/google_credentials.json'))" && echo "✅ JSON válido"

    - name: Run YouTube Monitor
      env:
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        GOOGLE_CREDENTIALS_PATH: credentials/google_credentials.json
        CONFIG_FILE: config.json
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
      run: python youtube_monitor.py

    - name: Upload summaries as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: youtube-summaries-${{ github.run_id }}
        path: summaries/
        retention-days: 30
