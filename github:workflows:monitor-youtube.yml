\f0\fs24 \cf0 name: YouTube Monitor Daily\
\
on:\
  schedule:\
    - cron: '0 8 * * *'  # 8h toda manh\'e3 (UTC)\
  workflow_dispatch:  # Permite rodar manualmente\
\
jobs:\
  monitor:\
    runs-on: ubuntu-latest\
\
    steps:\
    - uses: actions/checkout@v4\
\
    - name: Set up Python\
      uses: actions/setup-python@v4\
      with:\
        python-version: '3.11'\
\
    - name: Install dependencies\
      run: |\
        python -m pip install --upgrade pip\
        pip install -r requirements.txt\
\
    - name: Create Google Credentials\
      run: |\
        mkdir -p credentials\
        echo '$\{\{ secrets.GOOGLE_CREDENTIALS \}\}' > credentials/google_credentials.json\
\
    - name: Run YouTube Monitor\
      env:\
        CLAUDE_API_KEY: $\{\{ secrets.CLAUDE_API_KEY \}\}\
        GOOGLE_CREDENTIALS_PATH: credentials/google_credentials.json\
        CONFIG_FILE: config.json\
      run: python youtube_monitor.py\
\
    - name: Commit and push results\
      run: |\
        git config --global user.email "action@github.com"\
        git config --global user.name "GitHub Action"\
        git add summaries/\
        git commit -m "Add YouTube summaries - $(date +%Y-%m-%d)" || true\
        git push}